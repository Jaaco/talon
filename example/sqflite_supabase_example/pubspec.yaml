name: sqflite_supabase_example
description: "A Todo app demo showcasing Talon's offline-first sync with MVVM, signals, and shadcn_ui."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  talon:
    path: ../../
  sqflite: ^2.4.1
  shared_preferences: ^2.3.4
  supabase_flutter: ^2.8.2
  signals: ^6.3.0
  shadcn_ui: ^0.27.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  patrol: ^4.1.0

flutter:
  uses-material-design: true
